---
apiVersion: v1
kind: Secret
metadata:
  name: users-api-secret
  namespace: microservices
type: Opaque
stringData:
  API_KEY: changeme

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-api
  namespace: microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: users-api
  template:
    metadata:
      labels:
        app: users-api
    spec:
      containers:
      - name: users-api
        image: users-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3002
        env:
        - name: PORT
          value: "3002"
        - name: AUTH_MODE
          value: "apikey"
        - name: API_KEY
          valueFrom:
            secretKeyRef: { name: users-api-secret, key: API_KEY }
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef: { name: postgres-secret, key: DATABASE_URL }
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 15
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: users-svc
  namespace: microservices
spec:
  selector:
    app: users-api
  ports:
  - port: 80
    targetPort: 3002
