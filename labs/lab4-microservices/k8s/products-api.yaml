---
# Secret — API credentials
apiVersion: v1
kind: Secret
metadata:
  name: products-api-secret
  namespace: microservices
type: Opaque
stringData:
  API_KEY: changeme

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: products-api
  namespace: microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: products-api
  template:
    metadata:
      labels:
        app: products-api
    spec:
      containers:
      - name: products-api
        image: products-api:latest
        imagePullPolicy: IfNotPresent   # uses local image built by k3d
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: AUTH_MODE
          value: "apikey"
        - name: API_KEY
          valueFrom:
            secretKeyRef: { name: products-api-secret, key: API_KEY }
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef: { name: postgres-secret, key: DATABASE_URL }
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: products-svc
  namespace: microservices
spec:
  selector:
    app: products-api
  ports:
  - port: 80
    targetPort: 3001
