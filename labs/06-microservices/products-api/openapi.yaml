openapi: 3.0.0
info:
  title: Products API
  version: 1.0.0
  description: RESTful API for managing products. Secured via API key.

servers:
  - url: http://localhost:3001
    description: Local development

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    Product:
      type: object
      properties:
        id:          { type: integer, example: 1 }
        name:        { type: string,  example: "Wireless Headphones" }
        description: { type: string,  example: "Over-ear noise-cancelling headphones" }
        price:       { type: number,  format: float, example: 149.99 }
        category:    { type: string,  example: "Electronics" }
        stock:       { type: integer, example: 42 }
        sku:         { type: string,  example: "ELEC-WH-001" }
        created_at:  { type: string,  format: date-time }
        updated_at:  { type: string,  format: date-time }

    ProductInput:
      type: object
      required: [name, price]
      properties:
        name:        { type: string,  example: "Wireless Headphones" }
        description: { type: string,  example: "Over-ear noise-cancelling headphones" }
        price:       { type: number,  format: float, example: 149.99 }
        category:    { type: string,  example: "Electronics" }
        stock:       { type: integer, example: 42, default: 0 }
        sku:         { type: string,  example: "ELEC-WH-001" }

    PaginationMeta:
      type: object
      properties:
        total:      { type: integer }
        page:       { type: integer }
        limit:      { type: integer }
        totalPages: { type: integer }
        hasNext:    { type: boolean }
        hasPrev:    { type: boolean }

    Error:
      type: object
      properties:
        error: { type: string }

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

security:
  - ApiKeyAuth: []

paths:
  /health:
    get:
      summary: Health check
      security: []
      tags: [Health]
      responses:
        '200':
          description: Service is healthy

  /products:
    get:
      summary: List products (paginated)
      tags: [Products]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
      responses:
        '200':
          description: Paginated list of products
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Product' }
                  pagination: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }

    post:
      summary: Create a product
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductInput' }
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Product' }
        '400': { description: Validation error }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /products/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }

    get:
      summary: Get a product by ID
      tags: [Products]
      responses:
        '200':
          description: A single product
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Product' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

    put:
      summary: Update a product
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductInput' }
      responses:
        '200':
          description: Updated product
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Product' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

    delete:
      summary: Delete a product
      tags: [Products]
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
