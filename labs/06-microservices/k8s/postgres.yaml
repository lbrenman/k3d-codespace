---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: microservices
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: microservices
data:
  01-init.sql: |
    CREATE TABLE IF NOT EXISTS products (
      id          SERIAL PRIMARY KEY,
      name        VARCHAR(255) NOT NULL,
      description TEXT,
      price       NUMERIC(10, 2) NOT NULL,
      category    VARCHAR(100),
      stock       INTEGER NOT NULL DEFAULT 0,
      sku         VARCHAR(100) UNIQUE,
      created_at  TIMESTAMPTZ NOT NULL DEFAULT NOW(),
      updated_at  TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    CREATE OR REPLACE FUNCTION update_products_updated_at()
    RETURNS TRIGGER AS $$ BEGIN NEW.updated_at = NOW(); RETURN NEW; END; $$ LANGUAGE plpgsql;
    DROP TRIGGER IF EXISTS set_products_updated_at ON products;
    CREATE TRIGGER set_products_updated_at BEFORE UPDATE ON products FOR EACH ROW EXECUTE FUNCTION update_products_updated_at();

    CREATE TABLE IF NOT EXISTS users (
      id         SERIAL PRIMARY KEY,
      name       VARCHAR(255) NOT NULL,
      email      VARCHAR(255) NOT NULL UNIQUE,
      role       VARCHAR(50)  NOT NULL DEFAULT 'customer',
      active     BOOLEAN      NOT NULL DEFAULT TRUE,
      created_at TIMESTAMPTZ  NOT NULL DEFAULT NOW(),
      updated_at TIMESTAMPTZ  NOT NULL DEFAULT NOW()
    );
    CREATE OR REPLACE FUNCTION update_users_updated_at()
    RETURNS TRIGGER AS $$ BEGIN NEW.updated_at = NOW(); RETURN NEW; END; $$ LANGUAGE plpgsql;
    DROP TRIGGER IF EXISTS set_users_updated_at ON users;
    CREATE TRIGGER set_users_updated_at BEFORE UPDATE ON users FOR EACH ROW EXECUTE FUNCTION update_users_updated_at();

    INSERT INTO products (name, description, price, category, stock, sku) VALUES
      ('Wireless Headphones', 'Noise-cancelling headphones', 149.99, 'Electronics', 42, 'ELEC-WH-001'),
      ('Mechanical Keyboard', 'Cherry MX Brown switches',     89.99, 'Electronics', 18, 'ELEC-KB-002'),
      ('Desk Lamp',           'LED adjustable brightness',    34.99, 'Home Office',  75, 'HOME-DL-003')
    ON CONFLICT (sku) DO NOTHING;

    INSERT INTO users (name, email, role, active) VALUES
      ('Alice Martin', 'alice@example.com', 'admin',    true),
      ('Bob Chen',     'bob@example.com',   'customer', true),
      ('Eva Rossi',    'eva@example.com',   'manager',  true)
    ON CONFLICT (email) DO NOTHING;

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: microservices
type: Opaque
stringData:
  POSTGRES_DB:       shared_db
  POSTGRES_USER:     api_user
  POSTGRES_PASSWORD: api_pass
  DATABASE_URL:      postgresql://api_user:api_pass@postgres-svc:5432/shared_db

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef: { name: postgres-secret, key: POSTGRES_DB }
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef: { name: postgres-secret, key: POSTGRES_USER }
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef: { name: postgres-secret, key: POSTGRES_PASSWORD }
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: init
          mountPath: /docker-entrypoint-initdb.d
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "api_user", "-d", "shared_db"]
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: init
        configMap:
          name: postgres-init

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: microservices
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
