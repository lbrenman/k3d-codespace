openapi: 3.0.0
info:
  title: Users API
  version: 1.0.0
  description: RESTful API for managing users. Secured via API key.

servers:
  - url: http://localhost:3002
    description: Local development

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    User:
      type: object
      properties:
        id:         { type: integer, example: 1 }
        name:       { type: string,  example: "Alice Martin" }
        email:      { type: string,  format: email, example: "alice@example.com" }
        role:       { type: string,  example: "admin", enum: [admin, manager, customer] }
        active:     { type: boolean, example: true }
        created_at: { type: string,  format: date-time }
        updated_at: { type: string,  format: date-time }

    UserInput:
      type: object
      required: [name, email]
      properties:
        name:   { type: string,  example: "Alice Martin" }
        email:  { type: string,  format: email, example: "alice@example.com" }
        role:   { type: string,  example: "customer", default: "customer" }
        active: { type: boolean, example: true, default: true }

    PaginationMeta:
      type: object
      properties:
        total:      { type: integer }
        page:       { type: integer }
        limit:      { type: integer }
        totalPages: { type: integer }
        hasNext:    { type: boolean }
        hasPrev:    { type: boolean }

    Error:
      type: object
      properties:
        error: { type: string }

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

security:
  - ApiKeyAuth: []

paths:
  /health:
    get:
      summary: Health check
      security: []
      tags: [Health]
      responses:
        '200':
          description: Service is healthy

  /users:
    get:
      summary: List users (paginated)
      tags: [Users]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/User' }
                  pagination: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }

    post:
      summary: Create a user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserInput' }
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '400': { description: Validation error }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { description: Email already exists }

  /users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }

    get:
      summary: Get a user by ID
      tags: [Users]
      responses:
        '200':
          description: A single user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

    put:
      summary: Update a user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserInput' }
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

    delete:
      summary: Delete a user
      tags: [Users]
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
